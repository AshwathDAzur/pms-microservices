# ─────────────────────────────────────────────────────────────
# Secrets — all values are base64-encoded
# To encode: echo -n "plaintext" | base64
# These are placeholder values — override in deploy.sh or via
# a secrets manager (Vault, AWS Secrets Manager, Sealed Secrets)
# ─────────────────────────────────────────────────────────────

# Keycloak Postgres
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-postgres-secret
  namespace: pms
type: Opaque
data:
  POSTGRES_DB: a2V5Y2xvYWs=         # keycloak
  POSTGRES_USER: a2V5Y2xvYWs=       # keycloak
  POSTGRES_PASSWORD: a2V5Y2xvYWtfcGFzc3dvcmQ=  # keycloak_password

---
# Keycloak
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-secret
  namespace: pms
type: Opaque
data:
  KC_DB_USERNAME: a2V5Y2xvYWs=       # keycloak
  KC_DB_PASSWORD: a2V5Y2xvYWtfcGFzc3dvcmQ=  # keycloak_password
  KC_BOOTSTRAP_ADMIN_USERNAME: YWRtaW4=      # admin
  KC_BOOTSTRAP_ADMIN_PASSWORD: YWRtaW4=      # admin

---
# MySQL
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: pms
type: Opaque
data:
  MYSQL_ROOT_PASSWORD: cG1zX3Jvb3RfcGFzc3dvcmQ=  # pms_root_password
  MYSQL_USER: cG1zX3VzZXI=                         # pms_user
  MYSQL_PASSWORD: cG1zX3Bhc3N3b3Jk                 # pms_password

---
# Admin Service
apiVersion: v1
kind: Secret
metadata:
  name: admin-service-secret
  namespace: pms
type: Opaque
data:
  # Replace with: echo -n "<your-public-key>" | base64
  PUBLICKEY: REPLACE_WITH_BASE64_ENCODED_PUBLICKEY

---
# Management Service
apiVersion: v1
kind: Secret
metadata:
  name: management-service-secret
  namespace: pms
type: Opaque
data:
  # Replace with: echo -n "<your-public-key>" | base64
  PUBLICKEY: REPLACE_WITH_BASE64_ENCODED_PUBLICKEY
