apiVersion: apps/v1
kind: Deployment
metadata:
  name: pms-client
  namespace: pms
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pms-client
  template:
    metadata:
      labels:
        app: pms-client
    spec:
      containers:
        - name: pms-client
          image: REGISTRY/pms-client:TAG
          ports:
            - containerPort: 2407
          readinessProbe:
            httpGet:
              path: /
              port: 2407
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 2407
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"

---
apiVersion: v1
kind: Service
metadata:
  name: pms-client
  namespace: pms
spec:
  selector:
    app: pms-client
  ports:
    - port: 2407
      targetPort: 2407
