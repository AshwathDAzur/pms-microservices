apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-service
  namespace: pms
spec:
  replicas: 2
  selector:
    matchLabels:
      app: admin-service
  template:
    metadata:
      labels:
        app: admin-service
    spec:
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z pms-mysql 3306; do
                echo "waiting for mysql..."; sleep 3;
              done
      containers:
        - name: admin-service
          image: REGISTRY/pms-admin-service:TAG
          ports:
            - containerPort: 5000
          env:
            - name: PORT
              value: "5000"
            - name: ENV
              value: production
            - name: LOG_LEVEL
              value: info
            - name: MYSQL_HOST
              value: pms-mysql
            - name: MYSQL_PORT
              value: "3306"
            - name: MYSQL_DATABASE
              value: pms_db
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_PASSWORD
            - name: PUBLICKEY
              valueFrom:
                secretKeyRef:
                  name: admin-service-secret
                  key: PUBLICKEY
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: admin-service
  namespace: pms
spec:
  selector:
    app: admin-service
  ports:
    - port: 5000
      targetPort: 5000
