apiVersion: apps/v1
kind: Deployment
metadata:
  name: pms-redis
  namespace: pms
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pms-redis
  template:
    metadata:
      labels:
        app: pms-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["redis-server", "--save", "", "--appendonly", "no"]
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "128Mi"
              cpu: "100m"

---
apiVersion: v1
kind: Service
metadata:
  name: pms-redis
  namespace: pms
spec:
  selector:
    app: pms-redis
  ports:
    - port: 6379
      targetPort: 6379
