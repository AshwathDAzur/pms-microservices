apiVersion: apps/v1
kind: Deployment
metadata:
  name: pms-mysql
  namespace: pms
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pms-mysql
  template:
    metadata:
      labels:
        app: pms-mysql
    spec:
      containers:
        - name: pms-mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_DATABASE
              value: pms_db
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_PASSWORD
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
            - name: mysql-seed
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "mysqladmin ping -h localhost -u root --password=$MYSQL_ROOT_PASSWORD"
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 10
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "mysqladmin ping -h localhost -u root --password=$MYSQL_ROOT_PASSWORD"
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
      volumes:
        - name: mysql-data
          persistentVolumeClaim:
            claimName: mysql-pvc
        - name: mysql-seed
          configMap:
            name: mysql-seed

---
apiVersion: v1
kind: Service
metadata:
  name: pms-mysql
  namespace: pms
spec:
  selector:
    app: pms-mysql
  ports:
    - port: 3306
      targetPort: 3306
  clusterIP: None  # Headless for stable DNS
