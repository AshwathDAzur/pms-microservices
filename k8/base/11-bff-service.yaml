apiVersion: apps/v1
kind: Deployment
metadata:
  name: bff-service
  namespace: pms
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bff-service
  template:
    metadata:
      labels:
        app: bff-service
    spec:
      initContainers:
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z pms-redis 6379; do
                echo "waiting for redis..."; sleep 3;
              done
        - name: wait-for-keycloak
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z keycloak 8080; do
                echo "waiting for keycloak..."; sleep 5;
              done
      containers:
        - name: bff-service
          image: REGISTRY/pms-bff-service:TAG
          ports:
            - containerPort: 4000
          env:
            - name: PORT
              value: "4000"
            - name: ENV
              value: production
            - name: LOG_LEVEL
              value: info
            - name: REDIS_HOST
              value: pms-redis
            - name: REDIS_PORT
              value: "6379"
            - name: KEYCLOAK_URL
              value: http://keycloak:8080
            - name: KEYCLOAK_PUBLIC_URL
              value: http://pms.example.com   # ← update to your domain
            - name: KEYCLOAK_REALM
              value: projectManagementSystem
            - name: KEYCLOAK_CLIENT_ID
              value: pmsWebApp-bff
            - name: BFF_ORIGIN
              value: http://pms.example.com   # ← update to your domain
            - name: ADMIN_SERVICE_URL
              value: http://admin-service:5000
            - name: MANAGEMENT_SERVICE_URL
              value: http://management-service:5001
            - name: KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: bff-service-secret
                  key: KEYCLOAK_CLIENT_SECRET
          readinessProbe:
            httpGet:
              path: /bff/health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /bff/health
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: bff-service
  namespace: pms
spec:
  selector:
    app: bff-service
  ports:
    - port: 4000
      targetPort: 4000
